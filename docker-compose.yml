services:
  # 1. Веб-приложение (Node.js)
  web:
    build: .
    container_name: compose-web
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER:-admin}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secret123}
      - DB_NAME=${POSTGRES_DB:-myapp}
      - DB_PORT=${POSTGRES_PORT:-5432}
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        tag: "docker-compose-web"
        syslog-facility: "local0"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # 2. Кэш (Redis)
  redis:
    image: redis:${REDIS_VERSION:-alpine}
    container_name: compose-redis
    volumes:
      - redis-data:/data
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        tag: "docker-compose-redis"
        syslog-facility: "local0"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. База данных (PostgreSQL)
  postgres:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: compose-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        tag: "docker-compose-postgres"
        syslog-facility: "local0"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

# Объявляем тома
volumes:
  redis-data:
  postgres-data:

# Объявляем сеть
networks:
  app-network:
    driver: bridge
