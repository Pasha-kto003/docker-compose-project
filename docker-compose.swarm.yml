version: '3.8'

services:
  web:
    image: myapp-web:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_USER=admin
      - DB_NAME=myapp
      - DB_PORT=5432
      - DB_PASSWORD_FILE=/run/secrets/postgres_password
      - API_KEY_FILE=/run/secrets/api_key
    depends_on:
      - redis
      - postgres
    networks:
      - app-network
    secrets:
      - postgres_password
      - api_key
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: myapp
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    secrets:
      - postgres_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  redis-data:
  postgres-data:

networks:
  app-network:
    driver: overlay

secrets:
  postgres_password:
    external: true
  api_key:
    external: true
